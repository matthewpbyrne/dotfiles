##### ------------------------------------------------------------------
##### Core keybindings
##### ------------------------------------------------------------------

# Use Ctrl-Space as prefix instead of the default Ctrl-b
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Quick switch to previous window
bind a last-window

# Reload config manually
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"


##### ------------------------------------------------------------------
##### Environment
##### ------------------------------------------------------------------

# Keep important environment variables updated inside tmux sessions
set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_AGENT_PID WINDOWID XAUTHORITY PATH EDITOR VISUAL"

# Keep tmux server PATH aligned with your interactive shell enough for plugins/tools
# This helps plugins launched by tmux find asdf, brew, pnpm, etc.
set-environment -g PATH "/home/linuxbrew/.linuxbrew/bin:/home/matthew/.asdf/shims:/home/matthew/.local/bin:/home/matthew/.local/share/pnpm:/home/matthew/.luarocks/bin:/home/matthew/.cabal/bin:/home/matthew/.ghcup/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin"

# Extrakto: use a concrete fzf binary rather than the asdf wrapper/shim chain
set -g @extrakto_fzf_tool '/usr/bin/fzf'


##### ------------------------------------------------------------------
##### General behavior
##### ------------------------------------------------------------------

# Vi-style keys in copy mode
set-window-option -g mode-keys vi

# Quality-of-life defaults
set -sg escape-time 0
set -g history-limit 100000
set -g mouse on
set -g focus-events on

# Start numbering windows/panes from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows after one is closed
set -g renumber-windows on


##### ------------------------------------------------------------------
##### Plugins: TPM must stay installed and initialized at bottom
##### ------------------------------------------------------------------

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Baseline sane defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Auto reload config when saved
set -g @plugin 'b0o/tmux-autoreload'

# Copy / extract text helper
set -g @plugin 'laktak/extrakto'

# Auto window naming
set -g @plugin 'ofirgall/tmux-window-name'

# Status helpers
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-net-speed'

# Pane / zoom helpers
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'jaclu/tmux-power-zoom'

# Theme
set -g @plugin 'lawabidingcactus/tmux-gruvbox-truecolor'


##### ------------------------------------------------------------------
##### Status line / theme
##### ------------------------------------------------------------------

# Show network speed, battery, then time/date
set -g status-right '#{net_speed} | #{battery_remain} #{battery_percentage} #{battery_icon} | %H:%M %d %b'

# Possible theme mode options:
# set -g @tmux-gruvbox 'dark'
# set -g @tmux-gruvbox 'light'


##### ------------------------------------------------------------------
##### Notes / experiments
##### ------------------------------------------------------------------

# Possible future theme alternatives:
# set -g @plugin 'arcticicestudio/nord-tmux'
# set -g @plugin 'seebi/tmux-colors-solarized'
# set -g @plugin 'egel/tmux-gruvbox'

# Possible pomodoro plugins:
# set -g @plugin 'olimorris/tmux-pomodoro-plus'
# set -g @plugin 'swaroopch/tmux-pomodoro'

# Powerline alternative:
# set -g @plugin 'powerline/powerline'


##### ------------------------------------------------------------------
##### TPM init (must be last)
##### ------------------------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'
