##### ------------------------------------------------------------------
##### tmux entrypoint (profile-aware)
##### ------------------------------------------------------------------

# Keep this file small and stable. Shared and profile-specific config live in
# ~/.config/tmux/common and ~/.config/tmux/profiles.

# Resolve active profile from TMUX_PROFILE (set by launcher helpers), defaulting
# to "default" when no valid profile is provided.
if-shell 'TP="${TMUX_PROFILE-}"; case "$TP" in ""|*[!A-Za-z0-9_-]*) false ;; *) true ;; esac' \
	'set -sF @tmux_profile "#{env:TMUX_PROFILE}"' \
	'set -s @tmux_profile "default"'
# Note: -sF on the true branch expands #{env:TMUX_PROFILE} as a tmux format string;
# the false branch uses a literal string so -F is not needed there.

# Keep TMUX_PROFILE available in the server environment as documentation and for
# scripts/hooks that query it later.
set-environment -gF TMUX_PROFILE "#{@tmux_profile}"

# Shared baseline config fragments.
source-file ~/.config/tmux/common/00-bindings.conf
source-file ~/.config/tmux/common/10-environment.conf
source-file ~/.config/tmux/common/20-behavior.conf
source-file ~/.config/tmux/common/30-plugins-base.conf
source-file ~/.config/tmux/common/40-status.conf

# Profile-specific config. Missing profile falls back to default.
# $TMUX_PROFILE (shell process env, set at launch) and @tmux_profile (tmux server
# option, set above) hold the same validated value. The shell fallback :-default
# covers the case where tmux is started directly without TMUX_PROFILE in the env.
if-shell '[ -f "$HOME/.config/tmux/profiles/${TMUX_PROFILE:-default}.conf" ]' \
	'source-file -F "$HOME/.config/tmux/profiles/#{@tmux_profile}.conf"' \
	'source-file ~/.config/tmux/profiles/default.conf'

# Optional machine-local overrides (intentionally not tracked).
if-shell '[ -f "$HOME/.config/tmux/local/overrides.conf" ]' \
	'source-file ~/.config/tmux/local/overrides.conf' \
	''

##### ------------------------------------------------------------------
##### TPM init (must be last)
##### ------------------------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'
