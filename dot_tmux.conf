##### ------------------------------------------------------------------
##### tmux entrypoint (profile-aware)
##### ------------------------------------------------------------------

# Keep this file small and stable. Shared and profile-specific config live in
# ~/.config/tmux/common and ~/.config/tmux/profiles.

# Shared baseline config fragments.
source-file ~/.config/tmux/common/00-bindings.conf
source-file ~/.config/tmux/common/10-environment.conf
source-file ~/.config/tmux/common/20-behavior.conf
source-file ~/.config/tmux/common/30-plugins-base.conf
source-file ~/.config/tmux/common/40-status.conf

# Apply active profile via helper script when available. The helper owns
# validation and fallback-to-default semantics so profile resolution remains in
# one place.
#
# Intentionally use non-background run-shell here so profile application completes
# (set @tmux_profile, export TMUX_PROFILE, source profile config) before local
# overrides and TPM init, preserving startup ordering.
if-shell '[ -r "$HOME/.config/tmux/apply_profile.sh" ]' \
	'run-shell -F "TMUX_APPLY_SOCKET=\"#{socket_path}\" /bin/sh \"$HOME/.config/tmux/apply_profile.sh\""' \
	'set -s @tmux_profile default \; set-environment -g TMUX_PROFILE default \; source-file ~/.config/tmux/profiles/default.conf'

# Optional machine-local overrides (intentionally not tracked).
if-shell '[ -f "$HOME/.config/tmux/local/overrides.conf" ]' \
	'source-file ~/.config/tmux/local/overrides.conf' \
	''

##### ------------------------------------------------------------------
##### TPM init (must be last)
##### ------------------------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'
