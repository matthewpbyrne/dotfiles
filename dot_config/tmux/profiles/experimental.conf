##### ------------------------------------------------------------------
##### Profile: experimental (opt-in extras)
##### ------------------------------------------------------------------

# Start from default and add experimental plugin ideas here.
source-file ~/.config/tmux/profiles/default.conf

# Possible theme alternatives (uncomment to trial):
# set -g @plugin 'arcticicestudio/nord-tmux'
# set -g @plugin 'seebi/tmux-colors-solarized'
# set -g @plugin 'egel/tmux-gruvbox'

# Possible pomodoro plugins (uncomment to trial):
# set -g @plugin 'olimorris/tmux-pomodoro-plus'
# set -g @plugin 'swaroopch/tmux-pomodoro'

# Powerline alternative:
# set -g @plugin 'powerline/powerline'

set -g status-right 'exp | #{net_speed} | #{battery_remain} #{battery_percentage} #{battery_icon} | %H:%M %d %b'
