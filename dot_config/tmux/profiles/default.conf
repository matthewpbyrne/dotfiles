##### ------------------------------------------------------------------
##### Profile: default (stable main setup)
##### ------------------------------------------------------------------

# Auto reload config when saved
set -ga @plugin ' b0o/tmux-autoreload'

# Copy / extract text helper
set -ga @plugin ' laktak/extrakto'

# Auto window naming
set -ga @plugin ' ofirgall/tmux-window-name'

# Status helpers
set -ga @plugin ' tmux-plugins/tmux-battery'
set -ga @plugin ' tmux-plugins/tmux-net-speed'

# Pane / zoom helpers
set -ga @plugin ' tmux-plugins/tmux-pain-control'
set -ga @plugin ' jaclu/tmux-power-zoom'

# Theme
set -ga @plugin ' lawabidingcactus/tmux-gruvbox-truecolor'

# Possible theme mode options (uncomment one to override the default):
# set -g @tmux-gruvbox 'dark'
# set -g @tmux-gruvbox 'light'

# Show network speed, battery, then time/date (profile is shown in status-left)
set -g status-right '#{net_speed} | #{battery_remain} #{battery_percentage} #{battery_icon} | %H:%M %d %b'
