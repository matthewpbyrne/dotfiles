##### ------------------------------------------------------------------
##### Core keybindings
##### ------------------------------------------------------------------

# Use Ctrl-Space as prefix instead of the default Ctrl-b
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Quick switch to previous window
bind a last-window
bind Tab last-window

# Reload full profile-aware entrypoint config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded (#{@tmux_profile})"
