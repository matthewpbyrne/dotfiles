##### ------------------------------------------------------------------
##### Environment
##### ------------------------------------------------------------------

# Keep important environment variables updated inside tmux sessions
set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_AGENT_PID WINDOWID XAUTHORITY PATH EDITOR VISUAL"

# Keep tmux server PATH aligned with your interactive shell enough for plugins/tools.
# This helps plugins launched by tmux find asdf, brew, pnpm, etc., by explicitly adding common tool directories.
set-environment -g PATH "/home/linuxbrew/.linuxbrew/bin:$HOME/.asdf/shims:$HOME/.local/bin:$HOME/.local/share/pnpm:$HOME/.luarocks/bin:$HOME/.cabal/bin:$HOME/.ghcup/bin:$PATH"

# Extrakto: prefer a concrete fzf binary if available, but keep this portable
if-shell 'command -v fzf >/dev/null 2>&1' \
  'run-shell "tmux set -g @extrakto_fzf_tool \"$(command -v fzf)\""' \
  ''
