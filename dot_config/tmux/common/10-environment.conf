##### ------------------------------------------------------------------
##### Environment
##### ------------------------------------------------------------------

# Keep important environment variables updated inside tmux sessions
set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_AGENT_PID WINDOWID XAUTHORITY PATH EDITOR VISUAL"

# Explicitly propagate PATH into the tmux server environment so popup commands
# (e.g. extrakto, fzf) can locate bash, tmux, fzf, python, etc., but avoid
# clobbering PATH with an empty value in minimal startup environments.
if-shell -F "#{env:PATH}" \
  "set-environment -gF PATH \"#{env:PATH}\"" \
  ""

# Extrakto: prefer a concrete fzf binary if available, but keep this portable
if-shell 'command -v fzf >/dev/null 2>&1' \
  'run-shell "tmux set -g @extrakto_fzf_tool \"$(command -v fzf)\""' \
  ''
