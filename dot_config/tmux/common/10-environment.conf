##### ------------------------------------------------------------------
##### Environment
##### ------------------------------------------------------------------

# Keep important environment variables updated inside tmux sessions
set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_AGENT_PID WINDOWID XAUTHORITY PATH EDITOR VISUAL"

# Propagate PATH from the server process environment into the tmux server global
# environment so that popup commands (extrakto, fzf, run-shell hooks) can always
# locate executables.
#
# This uses tmux's own $VARIABLE expansion (from the server PROCESS environment
# at config-load time) rather than #{env:PATH} (tmux server global-environment
# format expansion).  The global environment may not yet be populated when this
# fragment is sourced during server startup, making #{env:PATH} unreliable.
#
# A system-path prefix is prepended as a safety baseline for edge cases where
# the server was started from a minimal environment with an empty or absent PATH
# (e.g. systemd user services, terminal emulators with no shell profile).
# This ensures at minimum that /usr/bin/env bash, fzf, python3, and the tmux
# binary itself are locatable inside popups and run-shell hooks.
set-environment -g PATH "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$HOME/.local/bin:$PATH"
# Note: this baseline covers FHS-compliant Linux and macOS.  Non-standard layouts
# (e.g. NixOS, Guix) should extend PATH further in ~/.config/tmux/local/overrides.conf.

# Extrakto: prefer a concrete fzf binary if available, but keep this portable
if-shell 'command -v fzf >/dev/null 2>&1' \
  'run-shell "tmux set -g @extrakto_fzf_tool \"$(command -v fzf)\""' \
  ''
