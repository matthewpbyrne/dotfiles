# ----------------------------------------------------------------------
# tmux copy/paste troubleshooting profile
# ----------------------------------------------------------------------
#
# Purpose:
# - keep a minimal tmux setup for reproducing copy/paste crashes
# - disable mouse reporting so terminal selection can be tested separately
# - skip TPM/plugins to isolate plugin-related crashes from core tmux behavior

source-file ~/.config/tmux/modules/env.conf
source-file ~/.config/tmux/modules/core.conf

# When debugging copy/paste issues, start by disabling tmux mouse handling so
# you can distinguish terminal-emulator selection from tmux copy-mode behavior.
set -g mouse off

source-file ~/.config/tmux/modules/keys.conf
