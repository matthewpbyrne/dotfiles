# ----------------------------------------------------------------------
# Key bindings
# ----------------------------------------------------------------------

# Use Ctrl-Space as prefix instead of the default Ctrl-b
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Quick switch to previous window
bind a last-window

# Reload config manually, refreshing PATH from the client environment first
#
# NOTE:
# - tmux expands #{...} formats before running the shell command.
# - #{env:PATH} reads PATH from the attaching client environment.
# - The guard avoids clobbering the tmux server PATH with an empty value.
#
# Result:
#   1. Refresh PATH from the current client environment
#   2. Reload the main config entrypoint
#   3. Display confirmation in the status line
bind r if-shell '[ -n "#{env:PATH}" ]' 'set-environment -gF PATH "#{env:PATH}"' \; \
       source-file ~/.config/tmux/tmux.conf \; \
       display-message "tmux config reloaded"
