# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Baseline sane defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Auto reload config when saved
set -g @plugin 'b0o/tmux-autoreload'

# Copy / extract text helper
set -g @plugin 'laktak/extrakto'

# Auto window naming
set -g @plugin 'ofirgall/tmux-window-name'

# Status helpers
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-net-speed'

# Pane / zoom helpers
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'jaclu/tmux-power-zoom'

# Theme
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Possible future theme alternatives:
# set -g @plugin 'arcticicestudio/nord-tmux'
# set -g @plugin 'seebi/tmux-colors-solarized'
# set -g @plugin 'egel/tmux-gruvbox'
# set -g @plugin 'lawabidingcactus/tmux-gruvbox-truecolor'

# Possible pomodoro plugins:
# set -g @plugin 'olimorris/tmux-pomodoro-plus'
# set -g @plugin 'swaroopch/tmux-pomodoro'

# Powerline alternative:
# set -g @plugin 'powerline/powerline'

# TPM init (must be last)
run '~/.tmux/plugins/tpm/tpm'
