# ----------------------------------------------------------------------
# Environment propagation
# ----------------------------------------------------------------------
#
# tmux maintains its own server environment which can drift from the
# user's interactive shell environment. This often causes plugins or
# commands run inside tmux to fail to locate tools installed via asdf,
# Homebrew, ghcup, pnpm, etc.
#
# Strategy:
#   1. update-environment keeps selected variables synced when clients attach
#   2. PATH is seeded from the attaching client environment using tmux
#      format expansion (#{env:VAR})
#
# This avoids hardcoding machine-specific PATH fragments while still
# ensuring tmux-launched processes can locate developer tooling.

set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_AGENT_PID WINDOWID XAUTHORITY PATH EDITOR VISUAL TERM TERM_PROGRAM TERM_PROGRAM_VERSION COLORTERM"

# Seed tmux server PATH from the attaching client; guard against empty value.
#
# NOTE:
# - #{env:PATH} reads PATH from the current client environment.
# - tmux expands #{...} formats before running the shell test.
# - The guard prevents accidentally replacing PATH with an empty value.
#
# Example expansion:
#   #{env:PATH} -> /usr/local/bin:/usr/bin:...
#
if-shell '[ -n "#{env:PATH}" ]' 'set-environment -gF PATH "#{env:PATH}"'


# ----------------------------------------------------------------------
# Plugin helpers
# ----------------------------------------------------------------------

# Extrakto prefers a concrete fzf binary if available
if-shell 'command -v fzf >/dev/null 2>&1' \
  'run-shell "tmux set -g @extrakto_fzf_tool \"$(command -v fzf)\""' \
  ''
