# Vi-style keys in copy mode
set-window-option -g mode-keys vi


# Prefer terminfo-driven defaults with explicit truecolor support for modern terminals.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",alacritty:RGB"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-features ",kitty:RGB"
set -as terminal-features ",ghostty:RGB"

# Quality-of-life defaults
set -sg escape-time 0
set -g history-limit 100000
set -g mouse on
set -g focus-events on

# Start numbering windows/panes from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows after one is closed
set -g renumber-windows on
