# ----------------------------------------------------------------------
# tmux configuration entrypoint
# ----------------------------------------------------------------------
#
# This configuration intentionally sources modules from ~/.config/tmux.
#
# Rationale:
#   - tmux itself does not provide robust XDG variable expansion inside
#     configuration files.
#   - supporting arbitrary $XDG_CONFIG_HOME locations inside tmux.conf
#     typically requires complex shell wrappers or conditional logic.
#   - this repository standardizes on the default XDG location
#       ~/.config/tmux
#     which is the convention used by most tmux dotfile setups.
#
# If XDG_CONFIG_HOME is customized, the recommended approach is to
# adjust the tmux launch command rather than the internal config paths.

source-file ~/.config/tmux/modules/env.conf
source-file ~/.config/tmux/modules/core.conf
source-file ~/.config/tmux/modules/keys.conf
source-file ~/.config/tmux/modules/ui.conf
source-file ~/.config/tmux/modules/plugins.conf
