# Managed by chezmoi
# Shared baseline terminal settings; keep per-terminal overrides minimal.

shell /bin/zsh --login
font_family monospace
font_size 12.0

# Match existing terminal padding/opacity defaults.
window_padding_width 2
background_opacity 0.9

# Theme indirection (can be swapped per-machine without editing base config).
include ~/.config/terminal-themes/kitty/current.conf
