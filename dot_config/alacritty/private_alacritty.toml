[env]
COLORTERM = "truecolor"
TERM = "xterm-256color"

[font]
size = 12

[font.normal]
family = "monospace"

[terminal.shell]
args = ["--login"]
program = "/bin/zsh"

[window]
dynamic_padding = true
opacity = 0.9

[window.padding]
x = 2
y = 2

[general]


import = [
    "~/.config/alacritty/themes/themes/tokyo_night_storm.toml"
]

[terminal]
